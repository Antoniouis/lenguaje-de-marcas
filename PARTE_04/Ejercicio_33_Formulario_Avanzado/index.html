<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro</title>
  <link rel="stylesheet" href="./scss/main.css">
</head>
<body>

  <form id="formulario">
    <h2>Registro</h2>

    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="usuario">
      <small class="error">Usuario requerido</small>
    </div>

    <div class="form-group">
      <label>Correo</label>
      <input type="email" id="correo">
      <small class="error">Correo inválido</small>
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="password">
      <small class="error">Mínimo 8 caracteres, una mayúscula y un número</small>
    </div>

    <div class="form-group">
      <label>Confirmar Contraseña</label>
      <input type="password" id="confirmPassword">
      <small class="error">Las contraseñas no coinciden</small>
    </div>

    <div class="form-group">
      <label>Teléfono</label>
      <input type="text" id="telefono">
      <small class="error">Teléfono inválido</small>
    </div>

    <button type="submit">Registrar</button>
  </form>

  <script src="java.js"></script>
</body>
</html>
