<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="dist/css/style.css">
</head>
<body>

  <div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">
      <h2 class="logo">MiPanel</h2>
      <nav class="menu">
        <a href="#">🏠 Inicio</a>
        <a href="#">👥 Usuarios</a>
        <a href="#">📊 Reportes</a>
        <a href="#">⚙️ Configuración</a>
      </nav>
    </aside>

    <!-- Header -->
    <header class="header">
      <button id="toggleSidebar">☰</button>
      <h1>Dashboard</h1>
      <div class="user">
        <span>👤 Admin</span>
      </div>
    </header>

    <!-- Content -->
    <main class="content">

      <div class="card">
        <h3>Ventas</h3>
        <p>$12,340</p>
      </div>

      <div class="card">
        <h3>Usuarios</h3>
        <p>1,245</p>
      </div>

      <div class="card">
        <h3>Visitas</h3>
        <p>23,456</p>
      </div>

      <div class="card">
        <h3>Conversiones</h3>
        <p>4.5%</p>
      </div>

      <div class="card">
        <h3>Pedidos</h3>
        <p>320</p>
      </div>

      <div class="card">
        <h3>Ingresos</h3>
        <p>$8,920</p>
      </div>

    </main>

  </div>

  <script src="src/js/main.js"></script>
</body>
</html>
