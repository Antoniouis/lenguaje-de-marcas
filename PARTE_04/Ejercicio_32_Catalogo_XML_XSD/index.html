<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Productos</title>
  <link rel="stylesheet" href="dist/css/style.css">
</head>
<body>

  <!-- DASHBOARD PRINCIPAL -->
  <div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2 class="logo">MiCatálogo</h2>
      <nav class="menu">
        <a href="#">🏠 Inicio</a>
        <a href="#">🛒 Productos</a>
        <a href="#">📊 Reportes</a>
        <a href="#">⚙️ Configuración</a>
        <a href="#">❓ Ayuda</a>
      </nav>
    </aside>

    <!-- HEADER -->
    <header class="header">
      <button id="toggleSidebar">☰</button>
      <h1>Catálogo de Productos</h1>
      <div class="user">
        <span>👤 Admin</span>
      </div>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="content">
      <section class="products-section">
        <h2>Todos los Productos</h2>
        <div id="productosContainer" class="grid">
          <!-- Las tarjetas se inyectarán aquí con JS -->
        </div>
      </section>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <p>© 2026 MiCatálogo. Todos los derechos reservados.</p>
    </footer>

  </div>

  <!-- JS -->
  <script src="src/js/main.js"></script>
</body>
</html>
